<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DC Machines Lab — Readings Recorder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0f172a; }
    .card { background: #1e293b; border: 1px solid #334155; }
    .input-field {
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      transition: border-color 0.2s;
    }
    .input-field:focus { outline: none; border-color: #3b82f6; }
    .input-field::placeholder { color: #475569; }
    thead tr { background: #0f172a; }
    tbody tr { border-bottom: 1px solid #1e293b; transition: background 0.15s; }
    tbody tr:hover { background: #1e293b; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body class="min-h-screen text-slate-200 font-sans">

  <!-- Header -->
  <header class="border-b border-slate-700 bg-slate-900/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
      <div class="w-9 h-9 rounded-lg bg-blue-600 flex items-center justify-center text-lg font-bold">⚡</div>
      <div>
        <h1 class="text-base font-bold text-slate-100">DC Machines Lab</h1>
        <p class="text-xs text-slate-400">Readings Recorder — fahdacademy.org</p>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <span id="conn-dot" class="w-2 h-2 rounded-full bg-yellow-400 pulse"></span>
        <span id="conn-label" class="text-xs text-slate-400">Connecting…</span>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-8">

    <!-- Form Card -->
    <section class="card rounded-2xl p-6 shadow-xl">
      <h2 class="text-sm font-semibold text-blue-400 uppercase tracking-widest mb-5">New Reading</h2>
      <form id="reading-form" class="grid grid-cols-1 sm:grid-cols-2 gap-4">

        <div class="sm:col-span-2">
          <label class="block text-xs text-slate-400 mb-1">Student Name</label>
          <input id="student_name" type="text" placeholder="e.g. Ahmad Al-Qahtani"
            class="input-field w-full rounded-lg px-4 py-2.5 text-sm" required />
        </div>

        <div>
          <label class="block text-xs text-slate-400 mb-1">Voltage — V (Volts)</label>
          <input id="voltage" type="number" step="0.01" placeholder="e.g. 220"
            class="input-field w-full rounded-lg px-4 py-2.5 text-sm" required />
        </div>

        <div>
          <label class="block text-xs text-slate-400 mb-1">Current — I (Amperes)</label>
          <input id="current" type="number" step="0.001" placeholder="e.g. 4.5"
            class="input-field w-full rounded-lg px-4 py-2.5 text-sm" required />
        </div>

        <div>
          <label class="block text-xs text-slate-400 mb-1">Speed — n (RPM)</label>
          <input id="speed" type="number" step="1" placeholder="e.g. 1500"
            class="input-field w-full rounded-lg px-4 py-2.5 text-sm" required />
        </div>

        <div class="flex items-end">
          <button type="submit" id="submit-btn"
            class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold
                   rounded-lg px-6 py-2.5 text-sm transition-colors flex items-center justify-center gap-2">
            <span id="btn-icon">＋</span>
            <span id="btn-text">Save Reading</span>
          </button>
        </div>

      </form>
      <div id="form-msg" class="mt-3 text-xs hidden"></div>
    </section>

    <!-- Table Card -->
    <section class="card rounded-2xl shadow-xl overflow-hidden">
      <div class="px-6 py-4 flex items-center justify-between border-b border-slate-700">
        <h2 class="text-sm font-semibold text-blue-400 uppercase tracking-widest">All Readings</h2>
        <div class="flex items-center gap-3">
          <span id="row-count" class="badge bg-slate-700 text-slate-300">— rows</span>
          <button onclick="loadReadings()" title="Refresh"
            class="text-slate-400 hover:text-blue-400 transition-colors text-lg leading-none">⟳</button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-xs text-slate-400 uppercase tracking-wider">
              <th class="px-5 py-3 text-left">#</th>
              <th class="px-5 py-3 text-left">Student</th>
              <th class="px-5 py-3 text-right">V (V)</th>
              <th class="px-5 py-3 text-right">I (A)</th>
              <th class="px-5 py-3 text-right">Speed (RPM)</th>
              <th class="px-5 py-3 text-right">P = V×I (W)</th>
              <th class="px-5 py-3 text-left">Time</th>
            </tr>
          </thead>
          <tbody id="readings-tbody">
            <tr>
              <td colspan="7" class="px-5 py-10 text-center text-slate-500 text-sm">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="text-center text-xs text-slate-600 py-6">
    DC Machines Lab Recorder · fahdacademy.org · المدرب فهد رفاعي
  </footer>

  <script>
    // ── Supabase Client ───────────────────────────────────────────
    const _sb = supabase.createClient(
      '%%SUPABASE_URL%%',
      '%%SUPABASE_ANON_KEY%%'
    );

    // ── Connection check ──────────────────────────────────────────
    async function checkConnection() {
      try {
        const { error } = await _sb.from('lab_readings').select('id').limit(1);
        const dot   = document.getElementById('conn-dot');
        const label = document.getElementById('conn-label');
        if (error) throw error;
        dot.classList.remove('bg-yellow-400','pulse');
        dot.classList.add('bg-green-400');
        label.textContent = 'Connected';
        label.classList.add('text-green-400');
      } catch {
        document.getElementById('conn-dot').classList.replace('bg-yellow-400','bg-red-500');
        document.getElementById('conn-label').textContent = 'Error';
      }
    }

    // ── Load readings ─────────────────────────────────────────────
    async function loadReadings() {
      const tbody = document.getElementById('readings-tbody');
      tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-8 text-center text-slate-500">Loading…</td></tr>`;

      const { data, error } = await _sb
        .from('lab_readings')
        .select('*')
        .order('created_at', { ascending: false });

      if (error || !data) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-8 text-center text-red-400">Failed to load data.</td></tr>`;
        return;
      }

      document.getElementById('row-count').textContent = `${data.length} row${data.length !== 1 ? 's' : ''}`;

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-5 py-10 text-center text-slate-500">No readings yet. Add the first one above.</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map((r, i) => {
        const power = (r.voltage * r.current).toFixed(1);
        const date  = new Date(r.created_at);
        const time  = date.toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' });
        return `
          <tr>
            <td class="px-5 py-3 text-slate-500">${i + 1}</td>
            <td class="px-5 py-3 font-medium text-slate-200">${esc(r.student_name)}</td>
            <td class="px-5 py-3 text-right text-yellow-300">${r.voltage}</td>
            <td class="px-5 py-3 text-right text-cyan-300">${r.current}</td>
            <td class="px-5 py-3 text-right text-purple-300">${r.speed}</td>
            <td class="px-5 py-3 text-right text-green-300">${power}</td>
            <td class="px-5 py-3 text-slate-400 text-xs">${time}</td>
          </tr>`;
      }).join('');
    }

    // ── Escape helper ─────────────────────────────────────────────
    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Form submit ───────────────────────────────────────────────
    document.getElementById('reading-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn  = document.getElementById('submit-btn');
      const msg  = document.getElementById('form-msg');
      btn.disabled = true;
      document.getElementById('btn-text').textContent = 'Saving…';
      msg.className = 'mt-3 text-xs hidden';

      const payload = {
        student_name: document.getElementById('student_name').value.trim(),
        voltage:      parseFloat(document.getElementById('voltage').value),
        current:      parseFloat(document.getElementById('current').value),
        speed:        parseInt(document.getElementById('speed').value),
      };

      const { error } = await _sb.from('lab_readings').insert([payload]);

      if (error) {
        msg.textContent = '❌ Error: ' + error.message;
        msg.className = 'mt-3 text-xs text-red-400';
      } else {
        msg.textContent = '✅ Reading saved successfully!';
        msg.className = 'mt-3 text-xs text-green-400';
        e.target.reset();
        loadReadings();
        setTimeout(() => { msg.className = 'mt-3 text-xs hidden'; }, 3000);
      }

      btn.disabled = false;
      document.getElementById('btn-text').textContent = 'Save Reading';
    });

    // ── Init ──────────────────────────────────────────────────────
    checkConnection();
    loadReadings();
  </script>
</body>
</html>
