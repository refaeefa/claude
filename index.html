<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #38bdf8; }
    p  { font-size: 0.9rem; color: #94a3b8; margin-bottom: 1.5rem; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 1rem;
      margin-bottom: 1rem;
      font-family: inherit;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    #status {
      margin-top: 1rem;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      min-height: 2rem;
    }
    .success { background: rgba(16,185,129,0.15); color: #10b981; }
    .error   { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .info    { background: rgba(56,189,248,0.15);  color: #38bdf8; }
    #messages { margin-top: 1.5rem; text-align: right; }
    .msg-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🧪 اختبار Supabase</h1>
    <p>أرسل رسالة وتُحفظ في قاعدة البيانات</p>
    <input type="text" id="msgInput" placeholder="اكتب رسالة...">
    <button onclick="sendMessage()">إرسال وحفظ</button>
    <button onclick="loadMessages()" style="background:#1e293b; color:#38bdf8; border:1px solid #38bdf8;">تحميل الرسائل</button>
    <div id="status"></div>
    <div id="messages"></div>
  </div>

  <script>
    const SUPABASE_URL = 'placeholder';
    const SUPABASE_ANON_KEY = 'placeholder';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    async function sendMessage() {
      const text = document.getElementById('msgInput').value.trim();
      if (!text) return setStatus('⚠️ اكتب رسالة أولاً', 'info');
      setStatus('⏳ جاري الحفظ...', 'info');
      const { error } = await client.from('messages').insert({ content: text });
      if (error) {
        setStatus('❌ خطأ: ' + error.message, 'error');
      } else {
        setStatus('✅ تم الحفظ بنجاح!', 'success');
        document.getElementById('msgInput').value = '';
        loadMessages();
      }
    }

    async function loadMessages() {
      setStatus('⏳ جاري التحميل...', 'info');
      const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: false }).limit(10);
      if (error) return setStatus('❌ ' + error.message, 'error');
      setStatus('✅ ' + data.length + ' رسائل', 'success');
      const el = document.getElementById('messages');
      el.innerHTML = data.map(m => `<div class="msg-item">💬 ${m.content}</div>`).join('');
    }
  </script>
</body>
</html>
